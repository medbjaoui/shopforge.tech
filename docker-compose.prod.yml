services:
  shopforge_db:
    container_name: shopforge_postgres
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: shopforge
      POSTGRES_USER: shopforge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - shopforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - shopforge_network
    # Pas de ports exposés — DB interne uniquement

  shopforge_traefik:
    container_name: shopforge_traefik
    image: traefik:v2.11
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - shopforge_network
    # AUCUN port exposé sur l'hôte — trafic entrant via cloudflared uniquement
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  shopforge_api:
    container_name: shopforge_api
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://shopforge:${DB_PASSWORD}@shopforge_db:5432/shopforge
      NODE_ENV: production
      UPLOADS_DIR: /app/uploads
    volumes:
      - shopforge_uploads_data:/app/uploads
    depends_on:
      shopforge_db:
        condition: service_healthy
    networks:
      - shopforge_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shopforge_api.rule=Host(`api.shopforge.tech`)"
      - "traefik.http.routers.shopforge_api.priority=10"
      - "traefik.http.services.shopforge_api.loadbalancer.server.port=3001"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # Pas de ports exposés — accessible via Traefik uniquement

  shopforge_web:
    container_name: shopforge_web
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    environment:
      # URL publique (client browser → Cloudflare → API)
      NEXT_PUBLIC_API_URL: https://api.shopforge.tech
      # URL interne (server components → API directement dans Docker network)
      INTERNAL_API_URL: http://shopforge_api:3001
      NODE_ENV: production
    depends_on:
      - shopforge_api
    networks:
      - shopforge_network
    labels:
      - "traefik.enable=true"
      # Catch-all : tout hostname qui n'est pas api.shopforge.tech
      - "traefik.http.routers.shopforge_web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.shopforge_web.priority=1"
      - "traefik.http.services.shopforge_web.loadbalancer.server.port=3000"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # Pas de ports exposés — accessible via Traefik uniquement

  shopforge_cloudflared:
    container_name: shopforge_cloudflared
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - shopforge_traefik
    networks:
      - shopforge_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Connexion SORTANTE uniquement vers Cloudflare — aucun port entrant requis
    # CF Dashboard → Tunnels → Public Hostnames :
    #   api.shopforge.tech  → http://shopforge_traefik:80
    #   *.shopforge.tech    → http://shopforge_traefik:80
    #   (custom domains ajoutés automatiquement via CloudflareService)

volumes:
  shopforge_postgres_data:
  shopforge_uploads_data:

networks:
  shopforge_network:
    driver: bridge
