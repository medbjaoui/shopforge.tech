# ─── API ──────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.shopforge.tech;

    location / {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── MARKETING + DASHBOARD + ADMIN (subdomains fixes) ─────────────────────────
server {
    listen 80;
    server_name shopforge.tech www.shopforge.tech app.shopforge.tech admin.shopforge.tech;

    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── STORE FRONTEND (wildcard *.shopforge.tech) ───────────────────────────────
server {
    listen 80;
    server_name ~^(?<tenant>[^.]+)\.shopforge\.tech$;

    # Bloquer les subdomains réservés (sécurité)
    if ($tenant ~* ^(api|app|admin|www|mail|ftp|static|cdn)$) {
        return 404;
    }

    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Tenant-Slug     $tenant;   # ← LA CLÉ
        proxy_cache_bypass $http_upgrade;
    }
}
